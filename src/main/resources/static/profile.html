<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Perfil do Personagem</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">
        <h2 id="name"></h2>
        <img id="characterImage" width="100" class="rounded-circle">
        <p id="game"></p>

        <h3>Posts</h3>

        <div id="posts"></div>

    </div>

    <script>

        const params = new URLSearchParams(window.location.search);
        const characterId = params.get("id");

        async function loadProfile() {

            const response = await fetch(`http://localhost:8080/characters/${characterId}`);

            const character = await response.json();

            document.getElementById("name").innerText = character.name;
            document.getElementById("game").innerText = character.game?.name || "";
            document.getElementById("characterImage").src = character.imageUrl;

        }

        async function loadPosts() {

            const response = await fetch(`http://localhost:8080/posts/${characterId}`);

            const posts = await response.json();

            const list = document.getElementById("posts");

            list.innerHTML = "";

            posts.forEach(p => {

                list.innerHTML += `
<div class="card p-3 mb-2">
<p>${p.content}</p>
</div>
`;

            });

        }

        loadProfile();
        loadPosts();

    </script>

</body>

</html>
