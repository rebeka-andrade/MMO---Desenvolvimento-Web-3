<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Gamer - MMO Rebeka & Clarice</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
  <div class="container mt-5">
    <h2>Bem-vindo, Gamer!</h2>
    <button class="btn btn-primary mb-3" onclick="showCharacterForm()">Criar Personagem</button>

    <!-- Formulário de criação de personagem -->
    <div id="characterForm" style="display:none;">
      <input type="text" class="form-control m-2" placeholder="Nome" id="charName">
      <input type="text" class="form-control m-2" placeholder="Classe/Tipo" id="charRole">
      <input type="text" class="form-control m-2" placeholder="Imagem (URL)" id="charImage">
      <select id="charGame" class="form-control m-2">
        <option value="1">World of Warcraft</option>
        <option value="2">League of Legends</option>
        <option value="3">Lost Ark</option>
      </select>
      <button class="btn btn-success" onclick="createCharacter()">Salvar</button>
    </div>

    <h3>Meus Personagens</h3>
    <div id="characterList" class="character-list"></div>
  </div>

  <script src="js/character.js"></script>
</body>

</html>
