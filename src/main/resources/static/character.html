<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Personagem - MMO Rebeka & Clarice</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <h2 id="characterName">Tela do Personagem</h2>

    <!-- Criar nova postagem -->
    <div class="mb-3">
      <textarea id="postContent" class="form-control" placeholder="Escreva sua postagem..."></textarea>
      <button class="btn btn-success mt-2" onclick="createPost()">Publicar</button>
    </div>

    <!-- Feed de postagens -->
    <h3>Feed</h3>
    <div id="postList"></div>

    <!-- Buscar personagens -->
    <h3>Buscar personagens</h3>
    <input type="text" id="searchInput" class="form-control" placeholder="Digite o nome do personagem">
    <button class="btn btn-primary mt-2" onclick="searchCharacters()">Buscar</button>
    <div id="searchResults"></div>

    <!-- Lives -->
    <h3>Lives dos personagens seguidos</h3>
    <div id="liveList"></div>
  </div>

  <script src="js/characterPage.js"></script>
</body>
</html>
