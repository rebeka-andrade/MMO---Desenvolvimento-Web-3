<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" class="form-control m-2" placeholder="Nome de usuário" id="username" required>
      <input type="password" class="form-control m-2" placeholder="Senha" id="password" required>
      <button type="submit" class="btn btn-success">Login</button>
    </form>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
